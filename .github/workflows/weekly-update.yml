name: Weekly Lotto Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Monday 00:10 KST is Sunday 15:10 UTC.
    - cron: "10 15 * * 0"

permissions:
  contents: write

concurrency:
  group: lotto-dashboard-pages
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Update dashboard data
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            python -m lotto_analyzer update-site --db data/lotto.db --site-dir docs --count 10 --no-sync
          else
            python -m lotto_analyzer update-site --db data/lotto.db --site-dir docs --count 10
          fi

      - name: Commit dashboard changes
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/draws.csv docs/data/latest.json docs/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update weekly lotto dashboard"
            git push
          fi

      - name: Deploy gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmpdir="$(mktemp -d)"
          cp -R docs/. "$tmpdir/"
          git checkout --orphan gh-pages-deploy
          git rm -rf .
          cp -R "$tmpdir"/. .
          git add .
          git commit -m "Deploy dashboard to GitHub Pages"
          git push --force origin gh-pages-deploy:gh-pages
